backend:
  name: git-gateway
  branch: master

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "notes"
    label: "Notes"
    folder: "src/content/notes"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["book", "movie", "article", "video", "paper"] }
      - { label: "Quality", name: "quality", widget: "number", value_type: "int", min: 1, max: 10, required: false, hint: "How good is this?" }
      - { label: "Significance", name: "significance", widget: "number", value_type: "int", min: 1, max: 10, required: false, hint: "How much did it matter to me?" }
      - { label: "Author", name: "creator", widget: "string", hint: "Author, director, or creator" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Summary", name: "summary", widget: "string", required: false }
      - { label: "URL", name: "url", widget: "string", required: false, hint: "Link to original source" }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "thoughts"
    label: "Thoughts"
    files:
      - label: "Thoughts"
        name: "thoughts"
        file: "src/content/thoughts.md"
        fields:
          - { label: "Body", name: "body", widget: "markdown" }

  - name: "lattice"
    label: "Lattice"
    folder: "src/content/lattice"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "The concept / term" }
      - { label: "Theme", name: "theme", widget: "select", options: ["tech", "strategy", "gtm", "epistemics", "investing"] }
      - { label: "Summary", name: "summary", widget: "string", hint: "The decoded one-liner" }
      - { label: "Source", name: "source", widget: "string", required: false, hint: "Who it's from (e.g. Mike Maples, Karl Popper)" }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Related", name: "related", widget: "list", required: false, hint: "Slugs of related entries" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "Body", name: "body", widget: "markdown" }
