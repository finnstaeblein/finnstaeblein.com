backend:
  name: git-gateway
  branch: master

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "notes"
    label: "Notes"
    folder: "src/content/notes"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Category", name: "category", widget: "select", options: ["book", "movie", "article", "video"] }
      - { label: "Rating", name: "rating", widget: "number", value_type: "int", min: 1, max: 10, required: false }
      - { label: "Creator", name: "creator", widget: "string", hint: "Author, director, or creator" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Summary", name: "summary", widget: "string", required: false }
      - { label: "URL", name: "url", widget: "string", required: false, hint: "Link to original source" }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "projects"
    label: "Projects"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Repo URL", name: "repo", widget: "string", required: false }
      - { label: "Live URL", name: "link", widget: "string", required: false }
      - { label: "Tech Stack", name: "stack", widget: "list", required: false }
      - { label: "Order", name: "order", widget: "number", value_type: "int", default: 0, required: false }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "Body", name: "body", widget: "markdown" }
